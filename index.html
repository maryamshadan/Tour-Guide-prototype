    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: {
                50: '#eff6ff',
                100: '#dbeafe',
                200: '#bfdbfe',
                300: '#93c5fd',
                400: '#60a5fa',
                500: '#3b82f6',
                600: '#2563EB',
                700: '#1d4ed8',
                800: '#1e40af',
                900: '#1e3a8a',
                950: '#172554',
              },
              accent: {
                500: '#F97316',
                600: '#EA580C',
                400: '#FB923C',
              },
              nature: {
                500: '#10B981',
                600: '#059669',
              },
              sepia: {
                100: '#fdf6e3',
                200: '#eee8d5',
                800: '#5b4636',
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Merriweather', 'serif'],
            },
            animation: {
              'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'float': 'float 3s ease-in-out infinite',
              'slide-up': 'slideUp 0.3s ease-out forwards',
              'fade-in': 'fadeIn 0.2s ease-out forwards',
              'wiggle': 'wiggle 0.5s ease-in-out infinite',
              'scan-line': 'scan 3s linear infinite',
              'spin-slow': 'spin 8s linear infinite',
              'bounce-subtle': 'bounce-subtle 2s ease-in-out infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-5px)' },
              },
              slideUp: {
                '0%': { transform: 'translateY(100%)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              },
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              wiggle: {
                '0%, 100%': { transform: 'rotate(-3deg)' },
                '50%': { transform: 'rotate(3deg)' },
              },
              scan: {
                '0%': { top: '0%', opacity: '0.2' },
                '50%': { top: '100%', opacity: '0.8' },
                '100%': { top: '0%', opacity: '0.2' },
              },
              'bounce-subtle': {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-3px)' },
              }
            }
          },
        },
      }
    </script>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      body { background-color: #F8FAFC; color: #1E293B; overscroll-behavior-y: contain; }
      .leaflet-container { font-family: 'Inter', sans-serif; z-index: 0; background: #fdf6e3; }
      .custom-marker-icon { background: transparent; border: none; transition: transform 0.2s ease-out; }
      .custom-marker-icon:hover { transform: scale(1.1) translateY(-2px); z-index: 1000 !important; }
      .map-tiles-sepia { filter: sepia(0.2) contrast(1.1) brightness(0.95); }
      .dark .leaflet-container { background: #0f172a; }
      .dark .map-tiles-sepia { filter: invert(1) hue-rotate(180deg) brightness(0.75) contrast(1.1); }
      
      .ar-hud-bracket { width: 30px; height: 30px; border: 2px solid rgba(255,255,255,0.4); position: absolute; }
      .ar-hud-tl { top: 20%; left: 10%; border-right: 0; border-bottom: 0; }
      .ar-hud-tr { top: 20%; right: 10%; border-left: 0; border-bottom: 0; }
      .ar-hud-bl { bottom: 20%; left: 10%; border-right: 0; border-top: 0; }
      .ar-hud-br { bottom: 20%; right: 10%; border-left: 0; border-top: 0; }

      .marker-pulse { 
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        border-radius: 100%;
        background: rgba(37, 99, 235, 0.4);
        animation: marker-pulse-anim 2s infinite;
        z-index: -1;
      }
      @keyframes marker-pulse-anim {
        0% { transform: scale(1); opacity: 0.8; }
        100% { transform: scale(2); opacity: 0; }
      }
      .perspective-1000 { perspective: 1000px; }
      .preserve-3d { transform-style: preserve-3d; }
      .rotate-x-10 { transform: rotateX(10deg); }
      .ar-node-shadow { box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.1); }
    </style>
